    put:
      operationId: setConfig
      summary: Update gateway configuration
      description: >
        Set one or more config values. Values must be positive finite numbers.
        Only known config keys are accepted.
      tags: [Config]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
