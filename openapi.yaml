      operationId: revokeOrDeleteKey
      summary: Revoke or permanently delete an API key
      description: >
        Without `permanent`, soft-revokes the key (sets `revoked = 1`).
        With `permanent=true`, permanently removes the key from the database.
        Hard-delete works on keys in any state (active or already revoked).
        Analytics events referencing the key are preserved.
      tags: [Keys]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/KeyIdPath'
        - $ref: '#/components/parameters/ZoneIdQuery'
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
          description: >
            When `true`, permanently deletes the key row instead of soft-revoking.
      responses:
        '200':
          description: Key revoked or deleted.
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
                  result:
                    type: object
                    properties:
                      revoked:
                        type: boolean
                        description: Present when soft-revoking.
                      deleted:
                        type: boolean
