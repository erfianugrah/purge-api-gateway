      tags: [UpstreamTokens]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Upstream token ID (prefix `upt_`).
      responses:
        '200':
          description: Token details (value redacted).
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
