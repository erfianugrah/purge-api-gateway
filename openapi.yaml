        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: No override found for this key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ─── S3 Proxy ────────────────────────────────────────────────────────────

  /s3/{path}:
    get:
      operationId: s3ProxyGet
      summary: S3 proxy (GET)
      description: &s3proxy-description >
        S3-compatible proxy to Cloudflare R2. Authenticates via AWS
        Signature Version 4 (header or presigned URL), evaluates the
        request against the credential's IAM policy, then re-signs and
        forwards to R2. Supports all S3 operations — 26 R2-native
        operations and 40 extended operations (forwarded to R2 which
        returns its own errors for unsupported ones).


        Use any S3-compatible client pointed at `https://<gateway>/s3`
        as the endpoint. Credentials are issued via
        `POST /admin/s3/credentials`.
      tags: [S3Proxy]
      security:
        - S3SigV4Auth: []
      parameters: &s3proxy-params
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: >
            S3 path: empty for ListBuckets, `<bucket>` for bucket ops,
            `<bucket>/<key>` for object ops.
      responses: &s3proxy-responses
        '200':
          description: Proxied R2 response. Content type varies by operation.
        '400':
          description: Invalid S3 request (malformed auth, bad path).
          content:
            application/xml:
              schema:
                type: string
                description: S3-compatible XML error response.
        '403':
          description: >
            Authentication failed (bad signature, revoked credential) or
            IAM policy denied the operation.
          content:
            application/xml:
              schema:
                type: string
        '501':
          description: >
            Operation not implemented by R2 (returned by R2 itself).
          content:
            application/xml:
              schema:
                type: string
    put:
      operationId: s3ProxyPut
      summary: S3 proxy (PUT)
      description: *s3proxy-description
      tags: [S3Proxy]
      security:
        - S3SigV4Auth: []
      parameters: *s3proxy-params
      responses: *s3proxy-responses
    post:
      operationId: s3ProxyPost
      summary: S3 proxy (POST)
      description: *s3proxy-description
      tags: [S3Proxy]
      security:
        - S3SigV4Auth: []
      parameters: *s3proxy-params
      responses: *s3proxy-responses
    delete:
      operationId: s3ProxyDelete
      summary: S3 proxy (DELETE)
      description: *s3proxy-description
      tags: [S3Proxy]
      security:
        - S3SigV4Auth: []
      parameters: *s3proxy-params
      responses: *s3proxy-responses
    head:
      operationId: s3ProxyHead
      summary: S3 proxy (HEAD)
      description: *s3proxy-description
      tags: [S3Proxy]
      security:
        - S3SigV4Auth: []
      parameters: *s3proxy-params
      responses: *s3proxy-responses

tags:
  - name: System
    description: Health and status endpoints.
  - name: Purge
    description: Cache purge operations proxied to Cloudflare.
  - name: Keys
    description: API key management with IAM policy documents.
  - name: Analytics
    description: D1-backed purge event analytics.
  - name: S3Credentials
    description: >
      S3 credential management. Credentials are separate from purge API keys
      and use access key ID (prefix `GK`) + secret access key authentication
      via AWS Signature Version 4.
  - name: S3Analytics
    description: >
      D1-backed analytics for S3 proxy requests. Account-level (no zone_id
      required, unlike purge analytics).
  - name: UpstreamTokens
    description: >
      Upstream Cloudflare API token management. Maps zone IDs to CF API tokens
      for proxying purge requests to the Cloudflare API.
  - name: UpstreamR2
    description: >
      Upstream R2 endpoint management. Maps bucket names to R2 credentials
      and endpoints for proxying S3 requests.
  - name: Config
    description: >
      Gateway configuration management. Supports runtime overrides of rate
      limits, cache TTLs, and retention periods without redeployment.
  - name: S3Proxy
    description: >
      S3-compatible proxy to Cloudflare R2 with IAM policy authorization.
      Clients use standard S3 SDKs (rclone, boto3, aws-cli) pointed at the
      gateway's `/s3` endpoint. Authentication uses AWS Signature Version 4
      with credentials issued via the S3Credentials admin endpoints.
