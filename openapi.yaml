                    type: boolean
                    const: true
                  result:
                    $ref: '#/components/schemas/UpstreamToken'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
