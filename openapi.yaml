  # ─── Admin: Config ───────────────────────────────────────────────────────

  /admin/config:
    get:
      operationId: getConfig
      summary: Get gateway configuration
      description: >
        Returns the resolved configuration, active overrides, and defaults.
      tags: [Config]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
