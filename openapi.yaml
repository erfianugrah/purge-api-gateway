  # ─── Admin: S3 Credentials ────────────────────────────────────────────────

  /admin/s3/credentials:
    post:
      operationId: createS3Credential
      summary: Create S3 credential
      description: >
        Create a new S3 credential with an attached IAM policy document.
        Returns the `access_key_id` (prefix `GK`) and `secret_access_key`.
        The secret is only shown on creation — it cannot be retrieved later.
        Use these credentials with any S3-compatible client (rclone, boto3,
        aws-cli) pointed at `https://<gateway>/s3`.
      tags: [S3Credentials]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateS3CredentialRequest'
            examples:
              full-access:
                summary: Full S3 access to all buckets
                value:
                  name: dev-full-access
                  policy:
                    version: '2025-01-01'
                    statements:
                      - effect: allow
                        actions: ['s3:*']
                        resources: ['*']
              read-only-prefix:
                summary: Read-only access to a key prefix
                value:
                  name: cdn-reader
                  policy:
                    version: '2025-01-01'
                    statements:
                      - effect: allow
                        actions: ['s3:GetObject', 's3:ListBucket']
                        resources: ['object:my-bucket/public/*', 'bucket:my-bucket']
                        conditions:
                          - field: key.prefix
                            operator: starts_with
                            value: 'public/'
                  expires_in_days: 90
      responses:
        '200':
          description: Credential created. Secret is only returned here.
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
                  result:
                    type: object
                    required: [credential]
                    properties:
                      credential:
                        $ref: '#/components/schemas/S3Credential'
                        description: >
                          The created credential. `secret_access_key` is only
                          present in this response — store it securely.
        '400':
          description: Validation error (missing fields, invalid policy).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

    get:
      operationId: listS3Credentials
      summary: List S3 credentials
      description: >
        Returns all S3 credentials. Secrets are redacted. Filter by
        status to get only active or revoked credentials.
      tags: [S3Credentials]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked]
          description: Filter by credential status.
      responses:
        '200':
          description: List of S3 credentials (secrets redacted).
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
                  result:
                    type: array
                    items:
                      $ref: '#/components/schemas/S3Credential'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /admin/s3/credentials/{id}:
    get:
      operationId: getS3Credential
      summary: Get S3 credential details
      description: >
        Returns credential metadata including the serialized policy.
        The secret is redacted.
      tags: [S3Credentials]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AccessKeyIdPath'
      responses:
        '200':
          description: Credential details (secret redacted).
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
                  result:
                    type: object
                    required: [credential]
                    properties:
                      credential:
                        $ref: '#/components/schemas/S3Credential'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

    delete:
      operationId: revokeOrDeleteS3Credential
      summary: Revoke or permanently delete an S3 credential
      description: >
        Without `permanent`, soft-revokes the credential (sets `revoked = 1`).
        The credential is immediately rejected on subsequent S3 requests
        (cache TTL up to 60s). With `permanent=true`, permanently removes the
        credential row from the database. Analytics events are preserved.
      tags: [S3Credentials]
      security:
        - CloudflareAccess: []
        - AdminKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/AccessKeyIdPath'
        - name: permanent
          in: query
          required: false
          schema:
            type: boolean
          description: >
            When `true`, permanently deletes the credential row instead of soft-revoking.
      responses:
        '200':
          description: Credential revoked or deleted.
          content:
            application/json:
              schema:
                type: object
                required: [success, result]
                properties:
                  success:
                    type: boolean
                    const: true
                  result:
                    type: object
                    properties:
                      revoked:
                        type: boolean
                        description: Present when soft-revoking.
                      deleted:
                        type: boolean
                        description: Present when permanently deleting.
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Credential not found (or already revoked, when soft-revoking).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

